<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Shadow layer -->
  <rect x="14" y="22" width="172" height="172" rx="36" fill="#3730a3"/>
  <!-- Main background -->
  <rect x="14" y="14" width="172" height="172" rx="36" fill="#6C63FF"/>
  <!-- Inner highlight -->
  <rect x="22" y="22" width="156" height="80" rx="28" fill="#7c73ff" opacity="0.5"/>

  <!-- Calculator screen -->
  <rect x="34" y="30" width="132" height="52" rx="14" fill="#eef2ff"/>
  <text x="100" y="64" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#6C63FF" text-anchor="middle">1+1=2</text>

  <!-- Button grid -->
  <!-- Row 1 -->
  <rect x="34" y="96" width="36" height="28" rx="9" fill="#4338ca"/>
  <text x="52" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">7</text>

  <rect x="76" y="96" width="36" height="28" rx="9" fill="#4338ca"/>
  <text x="94" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">8</text>

  <rect x="118" y="96" width="36" height="28" rx="9" fill="#4338ca"/>
  <text x="136" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">9</text>

  <!-- Row 2 -->
  <rect x="34" y="130" width="36" height="28" rx="9" fill="#4338ca"/>
  <text x="52" y="149" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">4</text>

  <rect x="76" y="130" width="36" height="28" rx="9" fill="#4338ca"/>
  <text x="94" y="149" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">5</text>

  <rect x="118" y="130" width="36" height="28" rx="9" fill="#fbbf24"/>
  <text x="136" y="149" font-family="Arial, sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle">+</text>

  <!-- Row 3 -->
  <rect x="34" y="164" width="80" height="24" rx="9" fill="#34d399"/>
  <text x="74" y="180" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle">=</text>

  <rect x="120" y="164" width="34" height="24" rx="9" fill="#fb923c"/>
  <text x="137" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">×</text>

  <!-- Stars -->
  <text x="18" y="16" font-size="16">⭐</text>
  <text x="162" y="16" font-size="16">⭐</text>
</svg>
